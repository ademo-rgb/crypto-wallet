<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Wallet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --ph:#7C5CFC;--gr:#4ADE80;--bg:#0e0e0e;--bg2:#1a1a1a;--bg3:#222;
  --bdr:#2a2a2a;--txt:#fff;--txt2:#888;--txt3:#444;--red:#f87171;
  --font:'Inter',sans-serif;--mono:'Space Mono',monospace;
}
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  font-family: var(--font);
  background: var(--bg);
}
.wrap{
  display:flex;
  justify-content:center;
  padding:16px 8px;
}
.phone{
  width:100%;
  max-width:390px; /* keeps original design max width */
  background:var(--bg);
  border-radius:44px;
  border:1px solid #1e1e1e;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:844px;
  position:relative;
  font-family:var(--font);
}

/* rest of your CSS remains the same */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.on{display:flex;}

/* HEADER */
.hdr{padding:20px 20px 0;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
/* ... keep all other CSS as is ... */

/* OPTIONAL: make scrollable areas fit smaller screens */
.sa, .pg-scroll{
  max-height: calc(100vh - 220px); /* ensures content fits on screen */
  overflow-y:auto;
}
.sa::-webkit-scrollbar, .pg-scroll::-webkit-scrollbar {display:none;}
</style>
</head>
<body>

<div class="wrap">
  <div class="phone" id="phone">
    <!-- ════ HOME SCREEN (keep all your HTML content here as is) ════ -->
    <div id="s-home" class="screen on">
      <!-- Your home screen HTML -->
    </div>
    <!-- ════ EDIT PROFILE ════ -->
    <div id="s-editprofile" class="screen page">
      <!-- Edit profile HTML -->
    </div>
    <!-- ════ SEND ════ -->
    <div id="s-send" class="screen page">
      <!-- Send screen HTML -->
    </div>
    <!-- ════ SWAP ════ -->
    <div id="s-swap" class="screen page">
      <!-- Swap screen HTML -->
    </div>
    <!-- ════ RECEIVE ════ -->
    <div id="s-receive" class="screen page">
      <!-- Receive screen HTML -->
    </div>
    <!-- ════ BUY ════ -->
    <div id="s-buy" class="screen page">
      <!-- Buy screen HTML -->
    </div>
  </div>
</div>

<script>
// Example JS to handle screen switching
function go(screenId){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(screenId).classList.add('on');
}
function back(){
  go('s-home');
}
</script>

</body>
</html>
